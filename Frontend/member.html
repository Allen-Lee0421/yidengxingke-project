<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | 易鑒星科</title>
    <style>
        /* 專為 Lee 先生設計的大字體介面 */
        body { font-size: 26px; background-color: #fdfaf5; font-family: "Microsoft JhengHei", sans-serif; margin: 0; }
        header { text-align: center; padding: 40px; background: #333; color: white; }
        .auth-container { display: flex; justify-content: space-around; padding: 50px; gap: 30px; }
        .form-box { width: 45%; padding: 40px; border: 5px solid #8e44ad; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h3 { color: #c0392b; font-size: 36px; border-bottom: 5px solid #c0392b; padding-bottom: 20px; margin-top: 0; }
        input { width: 100%; padding: 25px; margin: 20px 0; font-size: 24px; border: 2px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 25px; background: #c0392b; color: white; border: none; font-size: 30px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        button:hover { background: #a93226; transform: scale(1.02); transition: 0.3s; }
        .form-message { margin-top: 25px; padding: 20px; display: none; border-radius: 10px; font-weight: bold; text-align: center; font-size: 22px; }
        nav a { color: white; margin: 0 30px; text-decoration: none; font-size: 24px; }
    </style>
</head>
<body>

    <header>
        <h1>易鑒星科 - 會員管理系統</h1>
        <nav style="margin-top: 30px;">
            <a href="index.html">回首頁</a>
            <a href="member.html" style="color: #f1c40f; font-weight: bold;">會員中心</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="form-box">
            <h3>會員登入</h3>
            <form id="login-form">
                <input type="text" name="username" placeholder="帳號" required>
                <input type="password" name="password" placeholder="密碼" required>
                <button type="submit">確認登入</button>
                <div id="login-message" class="form-message"></div>
            </form>
        </div>

        <div class="form-box">
            <h3>新會員註冊</h3>
            <form id="register-form">
                <input type="text" name="username" placeholder="設定帳號" required>
                <input type="email" name="email" placeholder="電子郵件" required>
                <input type="password" name="password" placeholder="設定密碼" required>
                <button type="submit">立即註冊</button>
                <div id="register-message" class="form-message"></div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 已完全修正：不再使用錯誤的 yidengxingke 資料夾路徑
            const API_URL = '/backend/api.php'; 

            const handleFormSubmit = async (form, action, messageElement) => {
                const formData = new FormData(form);
                formData.append('action', action);
                messageElement.style.display = 'block';
                messageElement.textContent = '處理中...';
                messageElement.style.backgroundColor = '#e8f4fd';

                try {
                    const response = await fetch(API_URL, { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.success) {
                        messageElement.textContent = data.message;
                        messageElement.style.backgroundColor = '#d4edda';
                        messageElement.style.color = 'green';
                        if (action === 'login') {
                            localStorage.setItem('username', data.username);
                            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                        }
                    } else {
                        messageElement.textContent = data.message;
                        messageElement.style.backgroundColor = '#f8d7da';
                        messageElement.style.color = 'red';
                    }
                } catch (error) {
                    messageElement.textContent = '連線失敗：請檢查 backend/api.php 是否上傳。';
                    messageElement.style.backgroundColor = '#f8d7da';
                    messageElement.style.color = 'red';
                }
            };

            document.getElementById('login-form').onsubmit = function(e) { e.preventDefault(); handleFormSubmit(this, 'login', document.getElementById('login-message')); };
            document.getElementById('register-form').onsubmit = function(e) { e.preventDefault(); handleFormSubmit(this, 'register', document.getElementById('register-message')); };
        });
    </script>
</body>
</html>
